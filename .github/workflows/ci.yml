name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build all workspaces
        run: pnpm -r run build

      - name: Verify web client bundle (no RAG/Bedrock in client JS)
        run: pnpm --filter web run check:client-bundle

      - name: Check safety escalation scripts
        run: pnpm --filter @hypercare/safety check:scripts

      - name: Red-team v1 (offline smoke)
        run: pnpm --filter @hypercare/eval start -- redteam

      - name: Red-team v2 (offline gate, TASK-035)
        run: pnpm --filter @hypercare/eval run redteam:v2:gate

      - name: Test
        run: pnpm test

      - name: Install Playwright (Chromium only)
        run: pnpm --filter web exec playwright install chromium --with-deps

      - name: E2E auth smoke (login redirect, error page)
        run: pnpm --filter web test:e2e:auth
