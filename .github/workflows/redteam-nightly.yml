# Nightly (optional) — live red-team when `DATABASE_URL` + AWS creds are available.
# v1: prefer manual dispatch or laptop; wire org runner in a later sprint (TASK-026).

name: Red-team v1 (manual)

on:
  workflow_dispatch: {}

jobs:
  redteam_live:
    if: false
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
      - name: Install
        run: pnpm install --frozen-lockfile
      - name: Red-team live (disabled until secrets + runner)
        run: |
          echo "Set job.if to true, DATABASE_URL, and AWS_*, then: pnpm --filter @alongside/eval run redteam:live"
          exit 0
