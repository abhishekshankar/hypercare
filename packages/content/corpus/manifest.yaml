  # =========================================================
  # Forbidden / not in corpus
  # =========================================================

forbidden_sources:
  - reason: "Not peer-reviewed and not editorially board-vetted"
    examples:
      - "Reddit threads (use only for refusal-log topic discovery, never as a citation)"
      - "Quora"
      - "Generic health-info aggregators without medical-board review"
      - "Wikipedia (use for navigation only; cite the underlying source)"
  - reason: "Press releases as primary source for clinical claims"
    note: "Acceptable for regulatory events (FDA approval); cite both the press release and the underlying FDA letter."
  - reason: "Patient-experience sites with commercial conflicts"
    examples:
      - "Pharma-sponsored patient-information sites"
      - "Memory-care-facility marketing materials presented as education"

# =========================================================
# Refresh cadence
# =========================================================

refresh_cadence:
  locked_sources:
    - "Annual re-verification by Content Lead. Update last_verified after each pass."
    - "Immediate re-verification on FDA action, CMS policy change, or major guideline update (Alz Association, AAN, AAFP)."
  web_allowed_sources:
    - "Per-retrieval snapshot capture by Citation Agent."
    - "Quarterly audit of url_snapshot quality."
  alz-association-2026-facts-figures:
    - "Annual; replace with 2027 edition when published (typically March)."
  aarp-caregiving-in-the-us-2025:
    - "Replace with next AARP Caregiving in the U.S. wave (2030 expected)."
  cms-guide-participating-practices:
    - "Quarterly snapshot, since cohorts are admitted on a rolling basis."
