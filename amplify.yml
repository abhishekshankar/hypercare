version: 1
applications:
  - appRoot: apps/web
    frontend:
      # Monorepo: run phases from repo root so pnpm workspaces resolve; artifact path is
      # relative to this directory (see AWS monorepo Hosting docs).
      buildPath: /
      phases:
        preBuild:
          commands:
            # pnpm is not preinstalled on the Amplify Standard image; activate the
            # version pinned in the root package.json (`packageManager` field) via corepack.
            - corepack enable
            - corepack prepare pnpm@10.0.0 --activate
            - pnpm --version
            # Install the entire workspace from the repo root so workspace:^ deps
            # (@hypercare/db, @hypercare/picker, @hypercare/rag, @hypercare/safety) resolve.
            - pnpm install --frozen-lockfile
        build:
          commands:
            # Build workspace libraries first (`@hypercare/db` / `@hypercare/content`
            # ship `dist/` only; `next build` does not run their `tsc`).
            - pnpm --filter web... run build
        postBuild:
          commands:
            # `next build` leaves webpack/turbopack caches under `.next/cache` and copies them
            # again under `standalone/.../.next/cache`. They are not needed at runtime but can
            # exceed Amplify's ~220MB deploy artifact limit (~400MB+ observed).
            - echo "=== postBuild start ==="
            # Confirm Amplify's cwd and what's around it — `appRoot` + `buildPath` interaction
            # in monorepo mode can resolve artifact paths from a different anchor than expected.
            - pwd 2>&1 || true
            - ls -la 2>&1 || true
            - rm -rf apps/web/.next/cache apps/web/.next/standalone/apps/web/.next/cache 2>&1 || true
            # Diagnostic block: every command merges stderr into stdout (`2>&1`) so the Amplify
            # log viewer can't hide "No such file or directory" warnings on missing subtrees.
            # `ls -la` proves what `.next` actually contains; `find` confirms the standalone
            # entry point (`server.js`); `du -sh` gives per-subtree sizes for cap diagnosis.
            - ls -la apps/web/.next 2>&1 || true
            - ls -la apps/web/.next/standalone 2>&1 || true
            - find apps/web/.next/standalone -name "server.js" 2>&1 || true
            - du -sh apps/web/.next apps/web/.next/server apps/web/.next/static apps/web/.next/standalone 2>&1 || true
            - echo "=== postBuild done ==="
      artifacts:
        # `output: 'standalone'` (apps/web/next.config.ts) writes a self-contained server tree
        # under `.next/standalone` plus the client chunks under `.next/static`. Shipping the full
        # `.next/` would also upload `.next/server` — a duplicate of what's already inside
        # `standalone/` — and put the artifact over Amplify's ~220MB deploy limit (440MB+ observed).
        # Restrict the upload to the two trees the SSR runner actually needs.
        baseDirectory: apps/web/.next
        files:
          - "standalone/**/*"
          - "static/**/*"
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
          - apps/web/.next/cache/**/*
