version: 1
applications:
  - appRoot: apps/web
    frontend:
      # Monorepo: run phases from repo root so pnpm workspaces resolve; artifact path is
      # relative to this directory (see AWS monorepo Hosting docs).
      buildPath: /
      phases:
        preBuild:
          commands:
            # pnpm is not preinstalled on the Amplify Standard image; activate the
            # version pinned in the root package.json (`packageManager` field) via corepack.
            - corepack enable
            - corepack prepare pnpm@10.0.0 --activate
            - pnpm --version
            # Install the entire workspace from the repo root so workspace:^ deps
            # (@hypercare/db, @hypercare/picker, @hypercare/rag, @hypercare/safety) resolve.
            - pnpm install --frozen-lockfile
        build:
          commands:
            # Build workspace libraries first (`@hypercare/db` / `@hypercare/content`
            # ship `dist/` only; `next build` does not run their `tsc`).
            - pnpm --filter web... run build
        postBuild:
          commands:
            # `next build` leaves webpack/turbopack caches under `.next/cache`. They are not
            # needed at runtime and can push the artifact over Amplify's ~220MB deploy limit.
            - echo "=== postBuild start ==="
            - rm -rf apps/web/.next/cache 2>&1 || true
            # Diagnostics: confirm artifact layout + SSR-detection manifests at root.
            - ls -la apps/web/.next 2>&1 || true
            - du -sh apps/web/.next apps/web/.next/server apps/web/.next/static 2>&1 || true
            - |
              missing=""
              for f in BUILD_ID required-server-files.json routes-manifest.json prerender-manifest.json; do
                if [ ! -f "apps/web/.next/$f" ]; then missing="$missing $f"; fi
              done
              if [ -n "$missing" ]; then
                echo "FATAL: SSR detection manifests missing from .next/:$missing" >&2
                exit 1
              fi
              echo "SSR detection manifests present at .next/ root."
            - echo "=== postBuild done ==="
      artifacts:
        # Canonical AWS monorepo Next.js SSR artifact pattern: ship the whole `.next/` so
        # Amplify Hosting's SSR provider can bundle the function itself from `.next/server` +
        # `next-server.js.nft.json`. We do NOT use `output: 'standalone'` (apps/web/next.config.ts)
        # because with `outputFileTracingRoot` at the repo root the standalone entry lands at
        # `standalone/apps/web/server.js` — Amplify expects `standalone/server.js` at the artifact
        # root and silently fails to provision compute when it's nested.
        baseDirectory: apps/web/.next
        files:
          - "**/*"
      cache:
        paths:
          - node_modules/**/*
          - .pnpm-store/**/*
          - apps/web/.next/cache/**/*
